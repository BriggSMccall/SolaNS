name: CI

on:
  push:
    branches: [main]
  pull_request:

# ubuntu-24.04 provides GLIBC >= 2.39, required by Anchor 1.0 prebuilt tooling
# and the litesvm native binding.
jobs:
  build-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.89 (program build, per rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89.0"
          components: rustfmt, clippy

      # The Anchor CLI/avm binaries are standalone — they shell out to the repo's
      # pinned 1.89 for `anchor build`. Build them with stable so their tooling
      # deps (e.g. cargo-platform 0.3.3, MSRV rustc 1.91) compile; this becomes
      # the rustup default, while rust-toolchain.toml keeps the program at 1.89.
      - name: Install Rust stable (Anchor tooling)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Solana CLI 3.1.10
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v3.1.10/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor 1.0.2 (avm)
        # Force the stable toolchain for the tooling build: cargo runs in the repo
        # dir where rust-toolchain.toml pins 1.89, and `RUSTUP_TOOLCHAIN` outranks
        # that file (and applies to avm's internal `cargo install anchor-cli` too).
        # Needed because avm's deps (cargo-platform 0.3.3) require rustc >= 1.91.
        # rust-toolchain.toml still governs `anchor build` (no env there).
        env:
          RUSTUP_TOOLCHAIN: stable
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install 1.0.2
          avm use 1.0.2

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Restore the canonical program keypair so the built program id matches
      # `declare_id!` (target/ is gitignored, so the keypair is committed at the
      # repo root). Done after the cache restore so it always wins.
      - name: Restore program keypair
        run: |
          mkdir -p target/deploy
          cp solans-keypair.json target/deploy/solans-keypair.json

      - name: Build program
        run: NO_DNA=1 anchor build

      - name: Verify the generated client is up to date
        run: |
          pnpm generate
          git diff --exit-code clients/ts/src/generated

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (litesvm)
        run: pnpm --filter solans-tests test
